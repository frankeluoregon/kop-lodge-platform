<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1950 1600" width="1950" height="1600" font-family="'Courier New', monospace">
  <defs>
    <style>
      .wall { stroke: #1a1a2e; stroke-width: 4; fill: none; }
      .wall-thin { stroke: #1a1a2e; stroke-width: 2; fill: none; }
      .dim-line { stroke: #555; stroke-width: 1; fill: none; }
      .dim-arrow { fill: #555; }
      .dim-text { font-size: 13px; fill: #333; text-anchor: middle; font-weight: bold; }
      .room-label { font-size: 18px; fill: #1a1a2e; text-anchor: middle; font-weight: bold; }
      .room-sublabel { font-size: 12px; fill: #555; text-anchor: middle; }
      .street-label { font-size: 16px; fill: #666; text-anchor: middle; font-style: italic; }
      .exit-label { font-size: 11px; fill: #c0392b; text-anchor: middle; font-weight: bold; }
      .door { stroke: #1a1a2e; stroke-width: 2; fill: none; }
      .title { font-size: 22px; fill: #1a1a2e; text-anchor: middle; font-weight: bold; }
      .subtitle { font-size: 14px; fill: #555; text-anchor: middle; }
      .scale-text { font-size: 12px; fill: #666; text-anchor: start; }
      .north { font-size: 16px; fill: #1a1a2e; text-anchor: middle; font-weight: bold; }
      .stair-line { stroke: #888; stroke-width: 1; }
      .grid { stroke: #f0f0f0; stroke-width: 0.5; }
    </style>
    <!-- Arrow marker for dimension lines -->
    <marker id="arrow-start" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" class="dim-arrow"/>
    </marker>
    <marker id="arrow-end" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" class="dim-arrow"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1950" height="1600" fill="#fefefe"/>

  <!-- Title Block -->
  <text x="975" y="40" class="title">KNIGHTS OF PYTHIAS LODGE</text>
  <text x="975" y="60" class="subtitle">Ground Floor Plan &#x2014; Scale: 1 px = 1 in</text>

  <!-- ========================================= -->
  <!-- UPPER SECTION: Dining, Kitchen, Stairs    -->
  <!-- Offset: x - 300, y - 1100                 -->
  <!-- ========================================= -->

  <!-- DINING ROOM: x=382-940, y=1336-1737 (558" x 401") -->
  <!-- Top wall -->
  <line x1="82" y1="236" x2="640" y2="236" class="wall"/>
  <!-- Left wall -->
  <line x1="82" y1="236" x2="82" y2="637" class="wall"/>
  <!-- Bottom wall -->
  <line x1="82" y1="637" x2="640" y2="637" class="wall"/>
  <!-- Right wall drawn below with door gap -->
  <text x="361" y="430" class="room-label">Dining Room</text>
  <text x="361" y="452" class="room-sublabel">46'-6" x 33'-5"</text>

  <!-- Dining - top dimension -->
  <line x1="82" y1="218" x2="640" y2="218" class="dim-line" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="82" y1="228" x2="82" y2="208" class="dim-line"/>
  <line x1="640" y1="228" x2="640" y2="208" class="dim-line"/>
  <rect x="310" y="206" width="100" height="16" fill="#fefefe"/>
  <text x="361" y="218" class="dim-text">46'-6"</text>

  <!-- Dining - left dimension -->
  <line x1="64" y1="236" x2="64" y2="637" class="dim-line" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="54" y1="236" x2="74" y2="236" class="dim-line"/>
  <line x1="54" y1="637" x2="74" y2="637" class="dim-line"/>
  <rect x="20" y="428" width="88" height="16" fill="#fefefe"/>
  <text x="64" y="439" class="dim-text">33'-5"</text>

  <!-- KITCHEN (L-shaped): Upper x=940-1135, y=1336-1608; Lower x=940-1065, y=1608-1737 -->
  <!-- Kitchen upper walls -->
  <!-- Left wall (shared with Dining right) already drawn -->
  <!-- Top wall -->
  <line x1="640" y1="236" x2="835" y2="236" class="wall"/>
  <!-- Right wall upper -->
  <line x1="835" y1="236" x2="835" y2="508" class="wall"/>
  <!-- Step wall horizontal -->
  <line x1="765" y1="508" x2="835" y2="508" class="wall"/>
  <!-- Right wall lower -->
  <line x1="765" y1="508" x2="765" y2="637" class="wall"/>
  <!-- Bottom wall (shared, extends from Dining) -->
  <line x1="640" y1="637" x2="765" y2="637" class="wall"/>

  <!-- Kitchen label -->
  <text x="720" y="380" class="room-label">Kitchen</text>
  <text x="720" y="402" class="room-sublabel">16'-3" x 22'-8"</text>
  <text x="700" y="580" class="room-sublabel">(alcove: 10'-5" x 10'-9")</text>

  <!-- Kitchen top dimension -->
  <line x1="640" y1="220" x2="835" y2="220" class="dim-line" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <rect x="695" y="208" width="80" height="16" fill="#fefefe"/>
  <text x="737" y="220" class="dim-text">16'-3"</text>

  <!-- Kitchen right dimension (upper portion) -->
  <line x1="853" y1="236" x2="853" y2="508" class="dim-line" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="843" y1="236" x2="863" y2="236" class="dim-line"/>
  <line x1="843" y1="508" x2="863" y2="508" class="dim-line"/>
  <rect x="810" y="364" width="80" height="16" fill="#fefefe"/>
  <text x="853" y="375" class="dim-text">22'-8"</text>

  <!-- Kitchen lower alcove width dimension -->
  <line x1="640" y1="653" x2="765" y2="653" class="dim-line" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="640" y1="643" x2="640" y2="663" class="dim-line"/>
  <line x1="765" y1="643" x2="765" y2="663" class="dim-line"/>
  <rect x="660" y="641" width="80" height="16" fill="#fefefe"/>
  <text x="702" y="653" class="dim-text">10'-5"</text>

  <!-- Shared wall Dining/Kitchen (right wall of Dining) with door gap -->
  <line x1="640" y1="236" x2="640" y2="348" class="wall"/>
  <line x1="640" y1="400" x2="640" y2="637" class="wall"/>
  <!-- Door swing arc (opens into Kitchen) -->
  <path d="M640,348 Q692,348 692,400" class="door"/>
  <line x1="640" y1="400" x2="692" y2="400" class="door" stroke-dasharray="3,3"/>

  <!-- EXIT door at top of Kitchen -->
  <text x="700" y="230" class="exit-label">EXIT</text>
  <!-- Door opening in top wall -->
  <line x1="660" y1="236" x2="660" y2="200" class="door"/>
  <path d="M660,236 Q660,200 695,200" class="door"/>

  <!-- ========================================= -->
  <!-- STAIRS: x=1135-1460, y=1527-1737 (325" x 210") -->
  <!-- Adjusted: (835, 427) to (1160, 637)       -->
  <!-- ========================================= -->
  <rect x="835" y="427" width="325" height="210" class="wall"/>

  <!-- Internal wall at y=1602 → adjusted y=502 -->
  <line x1="877" y1="502" x2="1160" y2="502" class="wall-thin"/>

  <!-- Stair shading -->
  <rect x="835" y="427" width="325" height="210" fill="#e8e8f0"/>
  <!-- Lift notch -->
  <rect x="835" y="558" width="70" height="79" fill="#d0d4de"/>
  <line x1="905" y1="558" x2="905" y2="637" class="wall-thin"/>
  <line x1="835" y1="558" x2="905" y2="558" class="wall-thin"/>
  <text x="870" y="605" class="room-sublabel" font-size="9">Lift</text>

  <!-- Stair treads (vertical lines across depth) -->
  <line x1="880" y1="427" x2="880" y2="637" class="stair-line"/>
  <line x1="920" y1="427" x2="920" y2="637" class="stair-line"/>
  <line x1="960" y1="427" x2="960" y2="637" class="stair-line"/>
  <line x1="1000" y1="427" x2="1000" y2="637" class="stair-line"/>
  <line x1="1040" y1="427" x2="1040" y2="637" class="stair-line"/>
  <line x1="1080" y1="427" x2="1080" y2="637" class="stair-line"/>
  <line x1="1120" y1="427" x2="1120" y2="637" class="stair-line"/>

  <text x="998" y="480" class="room-label">Stairs</text>
  <text x="998" y="575" class="room-sublabel">27'-1" x 17'-6"</text>

  <!-- Stairs top dimension -->
  <line x1="835" y1="412" x2="1160" y2="412" class="dim-line" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="835" y1="402" x2="835" y2="422" class="dim-line"/>
  <line x1="1160" y1="402" x2="1160" y2="422" class="dim-line"/>
  <rect x="950" y="400" width="80" height="16" fill="#fefefe"/>
  <text x="998" y="412" class="dim-text">27'-1"</text>

  <!-- Stairs right dimension -->
  <line x1="1178" y1="427" x2="1178" y2="637" class="dim-line" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="1168" y1="427" x2="1188" y2="427" class="dim-line"/>
  <line x1="1168" y1="637" x2="1188" y2="637" class="dim-line"/>
  <rect x="1138" y="524" width="80" height="16" fill="#fefefe"/>
  <text x="1178" y="535" class="dim-text">17'-6"</text>

  <!-- EXIT door at bottom of Stairs area -->
  <text x="1145" y="660" class="exit-label">EXIT</text>
  <!-- Door opening in bottom wall -->
  <line x1="1120" y1="637" x2="1120" y2="673" class="door"/>
  <path d="M1120,637 Q1120,673 1085,673" class="door"/>

  <!-- Door between Kitchen lower and Stairs -->
  <line x1="835" y1="508" x2="835" y2="545" class="wall"/>
  <line x1="835" y1="597" x2="835" y2="637" class="wall"/>
  <path d="M835,545 Q887,545 887,597" class="door"/>

  <!-- ========================================= -->
  <!-- GRAND HALL: x=1587-1991, y=1201-1687      -->
  <!-- Adjusted: (1287, 101) to (1691, 587)       -->
  <!-- ========================================= -->
  <rect x="1287" y="101" width="404" height="486" class="wall"/>
  <text x="1489" y="340" class="room-label">Grand Hall</text>
  <text x="1489" y="362" class="room-sublabel">33'-8" x 40'-6"</text>

  <!-- Grand Hall top dimension -->
  <line x1="1287" y1="83" x2="1691" y2="83" class="dim-line" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="1287" y1="73" x2="1287" y2="93" class="dim-line"/>
  <line x1="1691" y1="73" x2="1691" y2="93" class="dim-line"/>
  <rect x="1440" y="71" width="80" height="16" fill="#fefefe"/>
  <text x="1489" y="83" class="dim-text">33'-8"</text>

  <!-- Grand Hall right dimension -->
  <line x1="1815" y1="101" x2="1815" y2="587" class="dim-line" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="1805" y1="101" x2="1825" y2="101" class="dim-line"/>
  <line x1="1805" y1="587" x2="1825" y2="587" class="dim-line"/>
  <rect x="1775" y="336" width="80" height="16" fill="#fefefe"/>
  <text x="1815" y="347" class="dim-text">40'-6"</text>

  <!-- ========================================= -->
  <!-- STAGE: x=1991-2098, y=1201-1687            -->
  <!-- Adjusted: (1691, 101) to (1798, 587)        -->
  <!-- ========================================= -->
  <rect x="1691" y="101" width="107" height="486" class="wall"/>
  <text x="1744" y="340" class="room-label" font-size="15">Stage</text>
  <text x="1744" y="360" class="room-sublabel">8'-11"</text>
  <text x="1744" y="375" class="room-sublabel">x 40'-6"</text>

  <!-- Stage width dimension -->
  <line x1="1691" y1="600" x2="1798" y2="600" class="dim-line" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="1691" y1="590" x2="1691" y2="610" class="dim-line"/>
  <line x1="1798" y1="590" x2="1798" y2="610" class="dim-line"/>
  <rect x="1705" y="588" width="70" height="16" fill="#fefefe"/>
  <text x="1744" y="600" class="dim-text">8'-11"</text>

  <!-- ========================================= -->
  <!-- LOWER BUILDING ENVELOPE                    -->
  <!-- x=351-1324, y=1814-2603                    -->
  <!-- Adjusted: (51, 714) to (1024, 1503)        -->
  <!-- ========================================= -->
  <rect x="51" y="714" width="973" height="789" class="wall"/>

  <!-- Building envelope dimensions -->
  <!-- Bottom dimension -->
  <line x1="51" y1="1523" x2="1024" y2="1523" class="dim-line" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="51" y1="1513" x2="51" y2="1533" class="dim-line"/>
  <line x1="1024" y1="1513" x2="1024" y2="1533" class="dim-line"/>
  <rect x="490" y="1511" width="80" height="16" fill="#fefefe"/>
  <text x="537" y="1523" class="dim-text">81'-1"</text>

  <!-- Right dimension -->
  <line x1="1042" y1="714" x2="1042" y2="1503" class="dim-line" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="1032" y1="714" x2="1052" y2="714" class="dim-line"/>
  <line x1="1032" y1="1503" x2="1052" y2="1503" class="dim-line"/>
  <rect x="1002" y="1101" width="80" height="16" fill="#fefefe"/>
  <text x="1042" y="1112" class="dim-text">65'-9"</text>

  <!-- ========================================= -->
  <!-- LODGE ROOM: x=590-935, y=1814-2039         -->
  <!-- Adjusted: (290, 714) to (635, 939)          -->
  <!-- ========================================= -->
  <!-- Lodge room walls with door gap on left -->
  <line x1="290" y1="714" x2="635" y2="714" class="wall"/>
  <line x1="635" y1="714" x2="635" y2="939" class="wall"/>
  <line x1="290" y1="939" x2="635" y2="939" class="wall"/>
  <line x1="290" y1="714" x2="290" y2="810" class="wall"/>
  <line x1="290" y1="862" x2="290" y2="939" class="wall"/>
  <!-- Lodge door swing (opens outward into parking lot) -->
  <path d="M290,810 Q238,810 238,862" class="door"/>

  <text x="462" y="820" class="room-label">Lodge</text>
  <text x="462" y="842" class="room-sublabel">28'-9" x 18'-9"</text>

  <!-- Lodge width dimension -->
  <line x1="290" y1="700" x2="635" y2="700" class="dim-line" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="290" y1="690" x2="290" y2="710" class="dim-line"/>
  <line x1="635" y1="690" x2="635" y2="710" class="dim-line"/>
  <rect x="420" y="688" width="80" height="16" fill="#fefefe"/>
  <text x="462" y="700" class="dim-text">28'-9"</text>

  <!-- Lodge height dimension -->
  <line x1="650" y1="714" x2="650" y2="939" class="dim-line" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="640" y1="714" x2="660" y2="714" class="dim-line"/>
  <line x1="640" y1="939" x2="660" y2="939" class="dim-line"/>
  <rect x="610" y="818" width="80" height="16" fill="#fefefe"/>
  <text x="650" y="829" class="dim-text">18'-9"</text>

  <!-- Parking Lot label -->
  <text x="462" y="1180" class="room-label">Parking Lot</text>

  <!-- ========================================= -->
  <!-- LANDING (stepped shape)                    -->
  <!-- Coordinates adjusted by -300, -1100        -->
  <!-- ========================================= -->
  <!-- Landing shape traced clockwise:
       (1284,712) → (1356,712) → (1356,1003) → (1284,1003)
       → (1284,1194) → (1094,1194) → (1094,1123)
       → (1205,1123) → (1205,930) → (1284,930) → (1284,712)
  -->
  <path d="M1284,712 L1356,712 L1356,1003 L1284,1003 L1284,1194 L1094,1194 L1094,1123 L1205,1123 L1205,930 L1284,930 L1284,712" class="wall"/>

  <text x="1270" y="870" class="room-label" font-size="15">Landing</text>

  <!-- Landing dimensions -->
  <!-- Top width -->
  <line x1="1284" y1="695" x2="1356" y2="695" class="dim-line" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="1284" y1="685" x2="1284" y2="705" class="dim-line"/>
  <line x1="1356" y1="685" x2="1356" y2="705" class="dim-line"/>
  <rect x="1284" y="683" width="60" height="16" fill="#fefefe"/>
  <text x="1320" y="695" class="dim-text">6'-0"</text>

  <!-- Right side height (top section) -->
  <line x1="1374" y1="712" x2="1374" y2="1003" class="dim-line" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="1364" y1="712" x2="1384" y2="712" class="dim-line"/>
  <line x1="1364" y1="1003" x2="1384" y2="1003" class="dim-line"/>
  <rect x="1340" y="849" width="68" height="16" fill="#fefefe"/>
  <text x="1374" y="860" class="dim-text">24'-3"</text>

  <!-- Bottom width -->
  <line x1="1094" y1="1210" x2="1284" y2="1210" class="dim-line" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="1094" y1="1200" x2="1094" y2="1220" class="dim-line"/>
  <line x1="1284" y1="1200" x2="1284" y2="1220" class="dim-line"/>
  <rect x="1148" y="1198" width="62" height="16" fill="#fefefe"/>
  <text x="1189" y="1210" class="dim-text">15'-10"</text>

  <!-- Left-lower height -->
  <line x1="1078" y1="1123" x2="1078" y2="1194" class="dim-line" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="1068" y1="1123" x2="1088" y2="1123" class="dim-line"/>
  <line x1="1068" y1="1194" x2="1088" y2="1194" class="dim-line"/>
  <rect x="1038" y="1150" width="60" height="16" fill="#fefefe"/>
  <text x="1078" y="1161" class="dim-text">5'-11"</text>

  <!-- Middle left section height -->
  <line x1="1188" y1="930" x2="1188" y2="1123" class="dim-line" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="1178" y1="930" x2="1198" y2="930" class="dim-line"/>
  <line x1="1178" y1="1123" x2="1198" y2="1123" class="dim-line"/>
  <rect x="1148" y="1018" width="60" height="16" fill="#fefefe"/>
  <text x="1188" y="1029" class="dim-text">16'-1"</text>

  <!-- ========================================= -->
  <!-- STREET LABELS                              -->
  <!-- ========================================= -->
  <!-- Laurence Ave (left/west side) -->
  <text x="28" y="1100" class="street-label" transform="rotate(-90, 28, 1100)">Laurence Ave</text>

  <!-- 12th Ave (bottom/south side) -->
  <text x="537" y="1555" class="street-label">12th Ave</text>

  <!-- ========================================= -->
  <!-- NORTH ARROW                                -->
  <!-- ========================================= -->
  <g transform="translate(1860, 1450)">
    <line x1="0" y1="50" x2="0" y2="-30" stroke="#1a1a2e" stroke-width="2"/>
    <polygon points="-8,0 8,0 0,-30" fill="#1a1a2e"/>
    <text x="0" y="-38" class="north">N</text>
  </g>

  <!-- ========================================= -->
  <!-- LEGEND / NOTES                             -->
  <!-- ========================================= -->
  <g transform="translate(1250, 1350)">
    <rect x="0" y="0" width="220" height="95" fill="#f8f8f8" stroke="#ccc" stroke-width="1" rx="4"/>
    <text x="110" y="20" class="dim-text" font-size="13">NOTES</text>
    <text x="10" y="38" class="scale-text">Scale: 1 px = 1 in</text>
    <text x="10" y="54" class="scale-text">Door icons: not to scale</text>
    <text x="10" y="70" class="scale-text">Measurements: derived from</text>
    <text x="10" y="84" class="scale-text">pixel dimensions of sketch</text>
  </g>

</svg>